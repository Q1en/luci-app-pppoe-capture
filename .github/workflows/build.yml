name: Build OpenWrt Package

on:
  push:
    branches:
      - main
      - master
    paths:
      - 'luci-app-pppoe-capture/**'
      - '.github/workflows/build.yml'
  pull_request:
    paths:
      - 'luci-app-pppoe-capture/**'
      - '.github/workflows/build.yml'
  workflow_dispatch:
    inputs:
      openwrt_version:
        description: 'OpenWrt release branch or tag'
        required: true
        default: 'openwrt-23.05'
      target:
        description: 'Target config name'
        required: true
        default: 'x86'
      subtarget:
        description: 'Subtarget config name'
        required: true
        default: '64'

jobs:
  build:
    name: Build luci-app-pppoe-capture (${{ matrix.openwrt_version }}-${{ matrix.target }}-${{ matrix.subtarget }})
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        include:
          - openwrt_version: openwrt-23.05
            target: x86
            subtarget: 64

    steps:
      - name: Checkout package repository
        uses: actions/checkout@v4

      - name: Resolve build parameters
        id: params
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "openwrt_version=${{ inputs.openwrt_version }}" >> "$GITHUB_OUTPUT"
            echo "target=${{ inputs.target }}" >> "$GITHUB_OUTPUT"
            echo "subtarget=${{ inputs.subtarget }}" >> "$GITHUB_OUTPUT"
          else
            echo "openwrt_version=${{ matrix.openwrt_version }}" >> "$GITHUB_OUTPUT"
            echo "target=${{ matrix.target }}" >> "$GITHUB_OUTPUT"
            echo "subtarget=${{ matrix.subtarget }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Install build dependencies
        shell: bash
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            clang \
            flex \
            bison \
            g++ \
            gawk \
            gcc-multilib \
            g++-multilib \
            gettext \
            git \
            libncurses5-dev \
            libssl-dev \
            python3-distutils \
            python3-setuptools \
            rsync \
            unzip \
            zlib1g-dev \
            file \
            wget

      - name: Clone OpenWrt source
        shell: bash
        run: |
          git clone --depth 1 --branch "${{ steps.params.outputs.openwrt_version }}" https://git.openwrt.org/openwrt/openwrt.git openwrt

      - name: Install feeds
        working-directory: openwrt
        shell: bash
        run: |
          ./scripts/feeds update -a
          ./scripts/feeds install -a

      - name: Add package to OpenWrt tree
        shell: bash
        run: |
          mkdir -p openwrt/package/luci-app-pppoe-capture
          rsync -a --delete \
            --exclude '.git' \
            --exclude '.github' \
            luci-app-pppoe-capture/ openwrt/package/luci-app-pppoe-capture/

      - name: Configure OpenWrt
        working-directory: openwrt
        shell: bash
        run: |
          cat > .config <<EOF
          CONFIG_TARGET_${{ steps.params.outputs.target }}=y
          CONFIG_TARGET_${{ steps.params.outputs.target }}_${{ steps.params.outputs.subtarget }}=y
          CONFIG_PACKAGE_luci-app-pppoe-capture=m
          EOF
          make defconfig

      - name: Download package dependencies
        working-directory: openwrt
        shell: bash
        run: |
          make package/luci-app-pppoe-capture/download V=s

      - name: Compile package
        working-directory: openwrt
        shell: bash
        run: |
          make package/luci-app-pppoe-capture/compile V=s -j"$(nproc)"

      - name: Collect artifacts
        shell: bash
        run: |
          mkdir -p artifacts
          find openwrt/bin/packages openwrt/bin/targets -type f \( -name 'luci-app-pppoe-capture_*.ipk' -o -name '*.buildinfo' -o -name '*.manifest' \) -exec cp -v {} artifacts/ \;
          ls -la artifacts

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: luci-app-pppoe-capture-${{ steps.params.outputs.openwrt_version }}-${{ steps.params.outputs.target }}-${{ steps.params.outputs.subtarget }}
          path: artifacts/*
          if-no-files-found: error
